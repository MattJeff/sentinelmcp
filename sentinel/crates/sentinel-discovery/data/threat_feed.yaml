# Sentinel MCP — curated threat intelligence feed
# -----------------------------------------------------------------------------
# This file lists known-bad / suspicious MCP packages, lookalike names,
# documented poisoning incidents, rug-pull demos, and revoked maintainers.
#
# Most entries below are *synthetic-demo* — i.e. plausible names invented for
# the Sentinel demo, mirroring documented public patterns (typo squats,
# tool-poisoning, rug-pull). They MUST NOT be interpreted as accusations
# against any real publisher unless they reference a public SAFE-T advisory
# or GHSA identifier.
#
# Schema:
#   version:        feed revision string (date-rev)
#   entries:        list of EntreeMenace
#     identifiant:  stable Sentinel ID (MCP-YYYY-NNN)
#     package_name: exact name we will match against ServeurMcpDeclare
#     raison:       short human reason
#     severite:     critical | high | medium
#     references:   list of external IDs (SAFE-T1001, GHSA-…, "lookalike", …)
#     publie_a:     date the entry was added to this feed (YYYY-MM-DD)
# -----------------------------------------------------------------------------

