name: Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Le crate `keyring` (résolution des secrets) dépend de `libdbus-sys` sur
      # Linux → la lib de dev dbus + pkg-config sont requises pour compiler.
      # (Sur macOS le Keychain est utilisé, sur Windows le Credential Manager :
      # aucune dépendance système.)
      - name: Dépendances système (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Installer Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sentinel

      - name: Format
        # continue-on-error le temps de passer `cargo fmt --all` sur le code
        # existant (diffs présents à HEAD dans sentinel-alerts notamment).
        # À repasser en gate dur une fois le formatage résorbé.
        continue-on-error: true
        run: cargo fmt --all --check
        working-directory: sentinel

      - name: Clippy
        # continue-on-error le temps de résorber les warnings existants
        continue-on-error: true
        run: cargo clippy --workspace -- -D warnings
        working-directory: sentinel

      # Linux/macOS : suite complète (intégration incluse). Les serveurs MCP
      # réels via `npx` sont ignorés proprement si npx est absent du runner.
      # --skip : test de perf (<1 ms pour 1000 lookups) trop strict pour les
      # runners partagés GitHub en build debug — flaky en CI, gardé en local.
      - name: Tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: cargo test --workspace --no-fail-fast -- --skip lookup_o1_moins_de_1ms_pour_1000_appels
        working-directory: sentinel

      # Windows : on garantit que TOUT compile (y compris les tests), puis on
      # exécute les tests unitaires hermétiques. Les tests d'INTÉGRATION de
      # découverte (tests/) sont OS-dépendants par nature (faux binaires sans
      # bit exécutable, extensions .exe, npx absent du PATH) et ne gatent donc
      # pas la CI Windows — leur compilation, elle, est vérifiée.
      - name: Build all-targets (Windows)
        if: runner.os == 'Windows'
        run: cargo build --workspace --all-targets
        working-directory: sentinel

      - name: Tests unitaires (Windows)
        if: runner.os == 'Windows'
        run: cargo test --workspace --lib --no-fail-fast -- --skip lookup_o1_moins_de_1ms_pour_1000_appels
        working-directory: sentinel

  frontend:
    name: Frontend (sentinel-desktop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: sentinel/sentinel-desktop/package.json

      - name: Installer Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: sentinel/sentinel-desktop/pnpm-lock.yaml

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile
        working-directory: sentinel/sentinel-desktop

      - name: Build
        run: pnpm run build
        working-directory: sentinel/sentinel-desktop
