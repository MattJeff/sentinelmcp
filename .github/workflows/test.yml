name: Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Installer Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sentinel

      - name: Format
        # continue-on-error le temps de passer `cargo fmt --all` sur le code
        # existant (diffs présents à HEAD dans sentinel-alerts notamment).
        # À repasser en gate dur une fois le formatage résorbé.
        continue-on-error: true
        run: cargo fmt --all --check
        working-directory: sentinel

      - name: Clippy
        # continue-on-error le temps de résorber les warnings existants
        continue-on-error: true
        run: cargo clippy --workspace -- -D warnings
        working-directory: sentinel

      - name: Tests
        # --skip : test de perf (<1 ms pour 1000 lookups) trop strict pour les
        # runners partagés GitHub en build debug — flaky en CI, gardé en local.
        # --no-fail-fast : exercer tous les crates même si l'un échoue.
        run: cargo test --workspace --no-fail-fast -- --skip lookup_o1_moins_de_1ms_pour_1000_appels
        working-directory: sentinel

  frontend:
    name: Frontend (sentinel-desktop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: sentinel/sentinel-desktop/package.json

      - name: Installer Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: sentinel/sentinel-desktop/pnpm-lock.yaml

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile
        working-directory: sentinel/sentinel-desktop

      - name: Build
        run: pnpm run build
        working-directory: sentinel/sentinel-desktop
